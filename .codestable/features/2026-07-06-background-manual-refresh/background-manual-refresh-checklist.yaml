feature: 2026-07-06-background-manual-refresh
created: 2026-07-06

steps:
  - action: "背景缓存判定：抽出可复用缓存与统一失效 helper，并让启动加载优先消费缓存快照"
    exit_signal: "同一组背景设置下重复打开新标签页会复用同一张背景，且缓存 helper 的纯逻辑测试可独立通过"
    status: done
  - action: "手动刷新控制面：由 App 持有 token/state，把新风车请求从 React 树内传到 Background"
    exit_signal: "点击风车后 Background 只响应一次 token 变化，风车旋转态与加载收尾一致"
    status: done
  - action: "页面右下角风车入口：新增独立悬浮背景刷新按钮，并显式继承现有 refresh 总开关"
    exit_signal: "refresh=false 时风车隐藏；refresh=true 且背景类型可刷新时出现风车；旧刷新按钮只保留 page / quote 行为"
    status: done
  - action: "源配置变更失效：把背景设置入口、排除图片、marketplace 与 config sync apply 接到统一缓存失效 helper"
    exit_signal: "修改任一背景来源关键配置或远端同步背景配置后，下次打开新标签页不会先显示旧缓存背景"
    status: done
  - action: "验证与收尾：补缓存逻辑测试、国际化文案与构建验证证据"
    exit_signal: "背景缓存测试、同步测试、lint、build 全部通过，且核心手工场景有证据"
    status: done

